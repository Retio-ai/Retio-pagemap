#
# SLSA Level 2 attested Docker build with SBOM + Cosign keyless signing.
# Replaces docker.yml — full provenance, multi-arch, dual registry.

name: Docker Attested Build

on:
  workflow_run:
    workflows: ["Publish to PyPI"]
    types: [completed]
  workflow_call:  # Reusable by weekly-rebuild.yml
    inputs:
      force_push:
        required: false
        type: boolean
        default: false
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  security-events: write

env:
  DOCKERHUB_IMAGE: retio1001/pagemap
  GHCR_IMAGE: ghcr.io/retio-ai/pagemap

jobs:
  build-and-attest:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_call' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      version: ${{ steps.version.outputs.version }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      # ── Standard image (Docker Hub) ──────────────────────────
      - name: Build and push (standard)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6.19.2
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            PAGEMAP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKERHUB_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Hardened image (Docker Hub + GHCR) with full provenance ──
      - name: Build and push (hardened + attested)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6.19.2
        with:
          context: .
          file: deploy/Dockerfile.hardened
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
          build-args: |
            PAGEMAP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.version.outputs.version }}-hardened
            ${{ env.DOCKERHUB_IMAGE }}:hardened
            ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.GHCR_IMAGE }}:latest
          cache-from: type=gha,scope=hardened
          cache-to: type=gha,scope=hardened,mode=max

      # ── SBOM generation (CycloneDX JSON via Syft) ──────────────
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11  # v0.23.0
        with:
          image: ${{ env.GHCR_IMAGE }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          artifact-name: pagemap-sbom

      # ── Cosign keyless signing ────────────────────────────────
      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad  # v4.0.0

      - name: Sign image with Cosign (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${{ env.GHCR_IMAGE }}@${DIGEST}"
          cosign sign --yes "${{ env.DOCKERHUB_IMAGE }}@${DIGEST}"

      - name: Attest SBOM with Cosign
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes --type cyclonedx \
            --predicate sbom.cyclonedx.json \
            "${{ env.GHCR_IMAGE }}@${DIGEST}"
          cosign attest --yes --type cyclonedx \
            --predicate sbom.cyclonedx.json \
            "${{ env.DOCKERHUB_IMAGE }}@${DIGEST}"

      # ── GitHub native attestation ─────────────────────────────
      - name: GitHub attestation (GHCR)
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26  # v4.1.0
        with:
          subject-name: ${{ env.GHCR_IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: GitHub attestation (Docker Hub)
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26  # v4.1.0
        with:
          subject-name: ${{ env.DOCKERHUB_IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: false

      # ── Trivy vulnerability scan ──────────────────────────────
      - name: Trivy scan (fail on CRITICAL)
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518  # v0.34.1
        with:
          image-ref: ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }}
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Trivy scan (SARIF upload)
        if: always()
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518  # v0.34.1
        with:
          image-ref: ${{ env.GHCR_IMAGE }}:${{ steps.version.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          limit-severities-for-sarif: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c4a7bc332abaec03596ff2803dd7f3ca3a238975  # v3
        with:
          sarif_file: trivy-results.sarif

  # ── Verification job ──────────────────────────────────────────
  verify:
    needs: build-and-attest
    runs-on: ubuntu-latest
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad  # v4.0.0

      - name: Verify image signature
        run: |
          cosign verify \
            --certificate-identity-regexp=".*pagemap.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "${{ env.GHCR_IMAGE }}@${{ needs.build-and-attest.outputs.digest }}"

      - name: Verify SBOM attestation
        run: |
          cosign verify-attestation \
            --type cyclonedx \
            --certificate-identity-regexp=".*pagemap.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "${{ env.GHCR_IMAGE }}@${{ needs.build-and-attest.outputs.digest }}"

      - name: Verify GitHub attestation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh attestation verify \
            "oci://${{ env.GHCR_IMAGE }}@${{ needs.build-and-attest.outputs.digest }}" \
            --owner "${{ github.repository_owner }}"
    env:
      GHCR_IMAGE: ghcr.io/retio-ai/pagemap
